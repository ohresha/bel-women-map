<main class="login">
  <section class="card">
    <p class="card__kicker">Служебный вход</p>
    <h1>Панель администратора</h1>
    <p class="card__lead">
      Войдите с учетной записью администратора Firebase, чтобы управлять биографиями, метками и содержимым карты.
    </p>

    @if (authError) {
      <div class="alert" role="alert">
        {{ authError }}
      </div>
    }

    <form class="form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="field">
        <span>Email</span>
        <input type="email" formControlName="email" placeholder="admin@example.com" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small>Укажите корректный email администратора.</small>
        }
      </label>

      <label class="field">
        <span>Пароль</span>
        <input type="password" formControlName="password" placeholder="Введите пароль" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small>Пароль должен содержать не менее 6 символов.</small>
        }
      </label>

      <button class="cta" type="submit" [disabled]="isSubmitting" style="height: 50px;">
        {{ isSubmitting ? 'Выполняется вход...' : 'Войти в админ-панель' }}
      </button>
    </form>

    <div class="card__footer">
      <a class="cta cta--outline" routerLink="/">Вернуться на главную</a>
    </div>
  </section>
</main>
